steps:
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - -t
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}
    - jobs/job_datos_fintrust

- name: gcr.io/cloud-builders/docker
  args:
    - push
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}

- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
    - run
    - jobs
    - deploy
    - ${_JOB_NAME}
    - --image
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}
    - --region
    - ${_REGION}
    - --service-account
    - ${_SERVICE_ACCOUNT}
    - --set-env-vars
    - APP_PROJECT_ID=$PROJECT_ID,SECRET_PROJECT_ID=${_SECRET_PROJECT_ID},SECRET_ID=${_SECRET_ID}

images:
- ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}

substitutions:
  _REGION: us-central1
  _REPOSITORY: test-ceiba
  _IMAGE: job-datos-fintrust
  _JOB_NAME: job-datos-fintrust
  _SERVICE_ACCOUNT: cloud-run-jobs@$PROJECT_ID.iam.gserviceaccount.com
  _SECRET_PROJECT_ID: ""
  _SECRET_ID: ""
